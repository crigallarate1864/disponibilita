<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Responsabile - Pubblica Turno MSB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-white rounded-lg shadow-md p-6 mt-6">
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">🚑 Richiedi Copertura MSB</h2>
        <p class="text-sm text-gray-500 text-center mb-6">Seleziona la data per vedere gli orari standard disponibili</p>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Data Turno</label>
                <input type="date" id="data_turno" onchange="aggiornaFasce Orarie()" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 p-2 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Fascia Oraria Standard</label>
                <select id="orario" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 p-2 border" disabled>
                    <option value="">Prima scegli una data...</option>
                </select>
            </div>

            <button onclick="pubblicaTurno()" id="btn-invia" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-md transition duration-200">
                Pubblica Richiesta e Invia Mail
            </button>
        </div>
        
        <div id="messaggio" class="mt-4 text-center font-semibold text-sm hidden"></div>
    </div>

    <script>
        // Definiamo gli orari del 118 che mi hai dato
        const orariStandard = {
            feriali: ["06:00 - 14:00", "13:30 - 20:30", "20:30 - 06:00"],
            sabato:  ["06:00 - 14:00", "13:30 - 20:30", "20:00 - 08:00"],
            domenica: ["08:00 - 14:00", "13:30 - 20:00", "19:30 - 06:00"]
        };

        function aggiornaFasceOrarie() {
            const dataInput = document.getElementById('data_turno').value;
            const selectOrario = document.getElementById('orario');
            
            if (!dataInput) return;

            const dataSelezionata = new Date(dataInput);
            const giornoSettimana = dataSelezionata.getDay(); // 0 = Domenica, 6 = Sabato, 1-5 = Feriali

            let opzioni = [];
            if (giornoSettimana === 0) {
                opzioni = orariStandard.domenica;
            } else if (giornoSettimana === 6) {
                opzioni = orariStandard.sabato;
            } else {
                opzioni = orariStandard.feriali;
            }

            // Svuotiamo e ripopoliamo il menu a tendina
            selectOrario.innerHTML = '';
            opzioni.forEach(ora => {
                const opt = document.createElement('option');
                opt.value = ora;
                opt.innerText = ora;
                selectOrario.appendChild(opt);
            });
            
            selectOrario.disabled = false;
        }

        async function pubblicaTurno() {
            const btn = document.getElementById('btn-invia');
            const msg = document.getElementById('messaggio');
            
            const data_turno = document.getElementById('data_turno').value;
            const orario = document.getElementById('orario').value;

            if(!data_turno || !orario) {
                alert("Compila tutti i campi!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Invio in corso...";

            try {
                const response = await fetch('api.php?azione=pubblica', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data_turno, orario, tipologia: 'MSB' }) // Fissato su MSB
                });
                const risultato = await response.json();

                if(risultato.status === 'success') {
                    msg.className = "mt-4 text-center font-semibold text-sm text-green-600";
                    msg.innerText = risultato.message;
                    document.getElementById('data_turno').value = '';
                    selectOrario.innerHTML = '<option value="">Prima scegli una data...</option>';
                    selectOrario.disabled = true;
                } else {
                    msg.className = "mt-4 text-center font-semibold text-sm text-red-600";
                    msg.innerText = "Errore durante la pubblicazione.";
                }
            } catch (error) {
                msg.className = "mt-4 text-center font-semibold text-sm text-red-600";
                msg.innerText = "Errore di connessione.";
            }

            msg.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = "Pubblica Richiesta e Invia Mail";
        }
    </script>
</body>
</html>
