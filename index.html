<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabellone Turni 118</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-2xl bg-white rounded-lg shadow-md p-6 mt-4">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">📋 Copertura Turni 118</h1>
        <p class="text-gray-500 text-center text-sm mb-6">Il primo che clicca ottiene il turno. Sistema a punteggio attivo.</p>

        <!-- Simulatore Utente per i test -->
        <div class="bg-yellow-50 border border-yellow-200 rounded p-3 mb-6 flex items-center justify-between">
            <span class="text-sm font-medium text-yellow-800">Simula Operatore:</span>
            <select id="selettore-utente" class="text-sm rounded border-gray-300 p-1">
                <option value="1">Mario Rossi (ID: 1)</option>
                <option value="2">Luigi Bianchi (ID: 2)</option>
            </select>
        </div>

        <!-- Qui comparirà la lista dei turni richiesti -->
        <div id="lista-turni" class="space-y-4">
            <p class="text-center text-gray-500">Caricamento turni in corso...</p>
        </div>
    </div>

    <script>
        // Funzione per caricare i turni all'apertura della pagina
        async function caricaTurni() {
            try {
                const response = await fetch('api.php?azione=lista_turni');
                const turni = await response.json();
                const container = document.getElementById('lista-turni');
                container.innerHTML = '';

                if(turni.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 py-4">Nessuna richiesta di turno presente al momento.</p>';
                    return;
                }

                turni.forEach(turno => {
                    const card = document.createElement('div');
                    card.className = `p-4 border rounded-lg flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${turno.stato === 'preso' ? 'bg-gray-50 border-gray-200' : 'bg-red-50 border-red-200'}`;

                    let infoTurno = `
                        <div>
                            <span class="inline-block px-2 py-1 text-xs font-bold uppercase rounded ${turno.stato === 'preso' ? 'bg-gray-200 text-gray-700' : 'bg-red-600 text-white'}">
                                ${turno.tipologia} - ${turno.stato.toUpperCase()}
                            </span>
                            <h3 class="text-lg font-bold text-gray-800 mt-1">Data: ${turno.data_turno}</h3>
                            <p class="text-gray-600 text-sm">Orario: ${turno.orario}</p>
                            ${turno.preso_da ? `<p class="text-xs text-green-700 font-semibold mt-1">Preso da: ${turno.preso_da}</p>` : ''}
                        </div>
                    `;

                    let bottone = '';
                    if(turno.stato === 'disponibile') {
                        bottone = `
                            <button onclick="prenotaTurno(${turno.id})" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow transition duration-150">
                                Prendi Turno!
                            </button>
                        `;
                    } else {
                        bottone = `<span class="text-gray-400 font-medium text-sm italic">Non più disponibile</span>`;
                    }

                    card.innerHTML = infoTurno + bottone;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Errore nel caricamento dei turni:", error);
            }
        }

        // Funzione che scatta quando si clicca "Prendi Turno!"
        async function prenotaTurno(turnoId) {
            const operatoreId = document.getElementById('selettore-utente').value;

            try {
                const response = await fetch('api.php?azione=prenota', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ turno_id: turnoId, operatore_id: operatoreId })
                });
                const risultato = await response.json();

                // Mostriamo l'esito (se successo o se qualcun altro ha anticipato)
                alert(risultato.message);
                
                // Ricarichiamo subito la lista aggiornata
                caricaTurni();
            } catch (error) {
                alert("Errore di rete durante la prenotazione.");
            }
        }

        // Avvia il caricamento dei turni all'apertura
        caricaTurni();
    </script>
</body>
</html>
