<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabellone Disponibilità MSB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-2xl bg-white rounded-lg shadow-md p-6 mt-4">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">🚑 Tabellone Richieste MSB</h1>
        <p class="text-gray-500 text-center text-sm mb-6">Elenco delle disponibilità richieste. Il primo che accetta ottiene il turno.</p>

        <div class="bg-yellow-50 border border-yellow-200 rounded p-3 mb-6 flex items-center justify-between">
            <span class="text-sm font-medium text-yellow-800">Simula Operatore per il Test:</span>
            <select id="selettore-utente" class="text-sm rounded border-gray-300 p-1">
                <option value="1">Mario Rossi (ID: 1)</option>
                <option value="2">Luigi Bianchi (ID: 2)</option>
            </select>
        </div>

        <div id="lista-turni" class="space-y-4">
            <p class="text-center text-gray-500">Caricamento in corso...</p>
        </div>
    </div>

    <script>
        async function caricaTurni() {
            try {
                const response = await fetch('api.php?azione=lista_turni');
                const turni = await response.json();
                const container = document.getElementById('lista-turni');
                container.innerHTML = '';

                if(turni.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 py-4">Nessuna richiesta di copertura attiva.</p>';
                    return;
                }

                turni.forEach(turno => {
                    const card = document.createElement('div');
                    // Cambia colore se è già stato preso
                    card.className = `p-4 border rounded-lg flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 ${turno.stato === 'preso' ? 'bg-gray-50 border-gray-200' : 'bg-white border-red-200 shadow-sm'}`;

                    let infoTurno = `
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="px-2 py-0.5 text-xs font-bold rounded ${turno.stato === 'preso' ? 'bg-gray-200 text-gray-600' : 'bg-red-100 text-red-800'}">
                                    MSB
                                </span>
                                ${turno.stato === 'preso' ? '<span class="text-xs text-green-600 font-bold">✓ ASSEGNATO</span>' : '<span class="text-xs text-orange-600 font-bold">● APERTO</span>'}
                            </div>
                            <h3 class="text-lg font-bold text-gray-800 mt-1">Data: ${formattaData(turno.data_turno)}</h3>
                            <p class="text-gray-600 text-sm">Fascia Oraria: <strong>${turno.orario}</strong></p>
                            ${turno.preso_da ? `<p class="text-xs text-gray-500 italic mt-1">Accettato da: ${turno.preso_da}</p>` : ''}
                        </div>
                    `;

                    let bottone = '';
                    if(turno.stato === 'disponibile') {
                        bottone = `
                            <button onclick="accettaTurno(${turno.id})" class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded shadow transition duration-150 uppercase tracking-wider text-sm">
                                Accetta
                            </button>
                        `;
                    } else {
                        bottone = `<span class="text-gray-400 font-medium text-sm italic p-2">Chiuso</span>`;
                    }

                    card.innerHTML = infoTurno + bottone;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error("Errore:", error);
            }
        }

        async function accettaTurno(turnoId) {
            const operatoreId = document.getElementById('selettore-utente').value;

            try {
                const response = await fetch('api.php?azione=prenota', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ turno_id: turnoId, operatore_id: operatoreId })
                });
                const risultato = await response.json();

                alert(risultato.message);
                caricaTurni(); // Aggiorna la pagina al volo
            } catch (error) {
                alert("Errore di connessione durante l'accettazione.");
            }
        }

        // Funzione di utilità per mostrare la data in formato italiano (GG/MM/AAAA)
        function formattaData(dataString) {
            const d = new Date(dataString);
            return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        caricaTurni();
    </script>
</body>
</html>
